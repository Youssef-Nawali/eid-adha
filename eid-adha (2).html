<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>عيد أضحى مبارك</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Reem+Kufi:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4af37;
    --gold-light: #f4d57a;
    --green-deep: #0b3d2e;
    --green-mid: #145a44;
    --cream: #fbf6e9;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Reem Kufi', 'Amiri', serif;
    background: radial-gradient(ellipse at top, #1a6b4f 0%, var(--green-deep) 55%, #06281e 100%);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
  }

  /* Decorative star pattern */
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(212,175,55,.15) 0 2px, transparent 3px),
      radial-gradient(circle at 70% 80%, rgba(212,175,55,.12) 0 2px, transparent 3px),
      radial-gradient(circle at 85% 15%, rgba(212,175,55,.10) 0 1.5px, transparent 2.5px),
      radial-gradient(circle at 35% 75%, rgba(212,175,55,.10) 0 1.5px, transparent 2.5px);
    background-size: 400px 400px;
    pointer-events: none;
    animation: twinkle 6s ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: .4 } to { opacity: 1 } }

  .card {
    position: relative;
    width: min(720px, 100%);
    background: linear-gradient(160deg, rgba(11,61,46,.85), rgba(6,40,30,.95));
    border: 1px solid rgba(212,175,55,.35);
    border-radius: 28px;
    padding: 3.5rem 2.5rem 3rem;
    text-align: center;
    box-shadow:
      0 30px 80px rgba(0,0,0,.5),
      inset 0 0 0 1px rgba(255,255,255,.04);
    backdrop-filter: blur(6px);
    overflow: hidden;
  }

  /* Ornamental corners */
  .corner {
    position: absolute; width: 70px; height: 70px;
    border: 2px solid var(--gold);
    opacity: .8;
  }
  .corner.tl { top: 18px; left: 18px; border-right: 0; border-bottom: 0; border-top-left-radius: 18px; }
  .corner.tr { top: 18px; right: 18px; border-left: 0; border-bottom: 0; border-top-right-radius: 18px; }
  .corner.bl { bottom: 18px; left: 18px; border-right: 0; border-top: 0; border-bottom-left-radius: 18px; }
  .corner.br { bottom: 18px; right: 18px; border-left: 0; border-top: 0; border-bottom-right-radius: 18px; }

  .crescent {
    font-size: 2.2rem;
    color: var(--gold);
    margin-bottom: .5rem;
    display: inline-block;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float { 50% { transform: translateY(-8px) } }

  h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    font-weight: 700;
    background: linear-gradient(180deg, var(--gold-light), var(--gold) 60%, #a8842a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.3;
    margin: .5rem 0 1rem;
    text-shadow: 0 2px 30px rgba(212,175,55,.25);
  }

  .divider {
    display: flex; align-items: center; justify-content: center;
    gap: .75rem; margin: 1rem auto 1.5rem;
  }
  .divider span {
    height: 1px; width: 80px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .divider .dot { color: var(--gold); font-size: 1.2rem; }

  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--cream);
    opacity: .85;
    margin-bottom: 2rem;
    line-height: 1.8;
  }

  /* Sheep illustration */
  .sheep-stage {
    position: relative;
    width: 240px;
    height: 180px;
    margin: 1rem auto 2rem;
    cursor: pointer;
  }
  .sheep-stage:active .sheep {
    animation: sheepBounce .25s ease;
  }
  @keyframes sheepBounce {
    0%   { transform: translateX(-50%) scale(1); }
    30%  { transform: translateX(-50%) scale(1.15, .85); }
    60%  { transform: translateX(-50%) scale(.95, 1.05) translateY(-18px); }
    100% { transform: translateX(-50%) scale(1); }
  }
  .ground {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 220px; height: 14px;
    background: radial-gradient(ellipse, rgba(0,0,0,.4), transparent 70%);
    border-radius: 50%;
  }
  .sheep {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%);
    animation: hop 2.4s ease-in-out infinite;
  }
  @keyframes hop {
    0%,100% { transform: translateX(-50%) translateY(0) }
    50%     { transform: translateX(-50%) translateY(-10px) }
  }

  .sheep .body {
    width: 150px; height: 100px;
    background: #fafafa;
    border-radius: 50% 50% 45% 45%;
    position: relative;
    box-shadow:
      inset -10px -8px 0 rgba(0,0,0,.06),
      0 8px 20px rgba(0,0,0,.3);
  }
  /* Wool puffs */
  .sheep .body::before,
  .sheep .body::after {
    content: "";
    position: absolute;
    background: #fafafa;
    border-radius: 50%;
  }
  .sheep .body::before {
    width: 50px; height: 50px;
    top: -18px; left: 15px;
    box-shadow:
      45px -10px 0 -2px #fafafa,
      85px 5px 0 -4px #fafafa,
      -5px 20px 0 -6px #fafafa;
  }
  .sheep .body::after {
    width: 40px; height: 40px;
    bottom: -8px; right: 20px;
    box-shadow: -60px 5px 0 -4px #fafafa;
  }

  .sheep .head {
    position: absolute;
    width: 60px; height: 65px;
    background: #2b2b2b;
    border-radius: 50% 50% 45% 45%;
    top: 10px; left: -30px;
    z-index: 2;
  }
  .sheep .ear-l, .sheep .ear-r {
    position: absolute;
    width: 22px; height: 14px;
    background: #1a1a1a;
    border-radius: 50%;
    top: 6px;
  }
  .sheep .ear-l { left: -8px; transform: rotate(-30deg); }
  .sheep .ear-r { right: -8px; transform: rotate(30deg); }
  .sheep .eye {
    position: absolute;
    width: 8px; height: 8px;
    background: #fff;
    border-radius: 50%;
    top: 25px;
  }
  .sheep .eye::after {
    content: ""; position: absolute;
    width: 4px; height: 4px;
    background: #000; border-radius: 50%;
    top: 2px; left: 2px;
  }
  .sheep .eye.left  { left: 12px; }
  .sheep .eye.right { right: 12px; }
  .sheep .nose {
    position: absolute;
    width: 10px; height: 6px;
    background: #f4a8a8;
    border-radius: 50%;
    bottom: 12px; left: 50%; transform: translateX(-50%);
  }
  .sheep .leg {
    position: absolute;
    width: 10px; height: 22px;
    background: #2b2b2b;
    border-radius: 4px;
    bottom: -18px;
  }
  .sheep .leg.l1 { left: 25px; }
  .sheep .leg.l2 { left: 55px; }
  .sheep .leg.l3 { right: 25px; }
  .sheep .leg.l4 { right: 55px; }

  .btn {
    appearance: none; border: 0; cursor: pointer;
    font-family: inherit;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    color: #2a1d05;
    font-weight: 700;
    font-size: 1.05rem;
    padding: .9rem 2.2rem;
    border-radius: 999px;
    box-shadow: 0 10px 25px rgba(212,175,55,.35);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 14px 30px rgba(212,175,55,.5); }
  .btn:active { transform: translateY(0); }

  .toast {
    position: fixed;
    bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,.85);
    color: var(--gold-light);
    padding: .8rem 1.5rem;
    border-radius: 999px;
    border: 1px solid var(--gold);
    opacity: 0;
    transition: all .35s ease;
    font-size: .95rem;
    z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Confetti / falling particles */
  .particle {
    position: fixed;
    top: -20px;
    font-size: 18px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 40;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Loading screen */
  .loader-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at top, #1a6b4f 0%, var(--green-deep) 55%, #06281e 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity .6s ease, visibility .6s ease;
  }
  .loader-overlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  .loader-text {
    font-family: 'Amiri', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    background: linear-gradient(180deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 1.5rem;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: .6; transform: scale(.98); }
    50%     { opacity: 1; transform: scale(1.02); }
  }
  .loader-spinner {
    width: 50px; height: 50px;
    border: 3px solid rgba(212,175,55,.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    margin-top: 1.5rem;
    font-size: .85rem;
    opacity: .55;
  }
</style>
</head>
<body>

  <div class="loader-overlay" id="loader">
    <div class="loader-text">عيد أضحى مبارك</div>
    <div class="loader-spinner"></div>
  </div>

  <main class="card" role="main">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="crescent">☾ ✦</div>

    <h1>عيد أضحى مبارك</h1>

    <div class="divider">
      <span></span><span class="dot">✦</span><span></span>
    </div>

    <p class="subtitle">
      كل عام وأنتم بخير — تقبّل الله منّا ومنكم صالح الأعمال
    </p>

    <div class="sheep-stage" aria-label="Sheep illustration">
      <div class="sheep">
        <div class="body">
          <div class="head">
            <span class="ear-l"></span>
            <span class="ear-r"></span>
            <span class="eye left"></span>
            <span class="eye right"></span>
            <span class="nose"></span>
          </div>
          <span class="leg l1"></span>
          <span class="leg l2"></span>
          <span class="leg l3"></span>
          <span class="leg l4"></span>
        </div>
      </div>
      <div class="ground"></div>
    </div>

    <button class="btn" id="celebrate">🎉 أرسل التهنئة</button>

    <footer>© <span id="year"></span> — Eid Mubarak</footer>
  </main>

  <div class="toast" id="toast">تم نسخ التهنئة إلى الحافظة ✦</div>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const btn = document.getElementById('celebrate');
  const toast = document.getElementById('toast');
  const emojis = ['🌙','✦','⭐','🕌','🐑','✨'];

  function shower() {
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (3 + Math.random() * 3) + 's';
      p.style.fontSize = (14 + Math.random() * 18) + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 6000);
    }
  }

  async function copyGreeting() {
    const msg = 'عيد أضحى مبارك — كل عام وأنتم بخير 🌙';
    try {
      await navigator.clipboard.writeText(msg);
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2200);
    } catch (_) { /* clipboard unavailable */ }
  }

  btn.addEventListener('click', () => {
    shower();
    copyGreeting();
  });

  // Initial welcome shower
  window.addEventListener('load', () => {
    shower();
    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
    }, 1500);
  });

  /* Sheep baa sound */
  const sheepStage = document.querySelector('.sheep-stage');
  const baaAudio = document.getElementById('baa');

  function playBaa() {
    baaAudio.currentTime = 0;
    baaAudio.play().catch(() => {});
  }

  sheepStage.addEventListener('click', playBaa);
</script>
